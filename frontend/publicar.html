<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Publicar</title>
<link rel="stylesheet" href="css/styles.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<script>
const user = JSON.parse(localStorage.getItem("usuario") || "{}");
if (user.rol !== "trabajador") {
  document.body.innerHTML = "<h2 class='text-center mt-5'>Solo trabajadores pueden publicar</h2>";
}
</script>

<nav class="navbar navbar-dark bg-dark p-3">
  <div class="container">
    <a class="navbar-brand text-white" href="index.html">JobLink</a>
    <div id="userInfo"></div>
  </div>
</nav>

<div class="container mt-5">
  <h2>Publicar servicio</h2>

  <form onsubmit="publicar(event)">
    <input id="titulo" class="form-control mb-3" placeholder="Título">
    <textarea id="descripcion" class="form-control mb-3" placeholder="Descripción"></textarea>
    <input id="categoria" class="form-control mb-3" placeholder="Categoría">
    <input id="ubicacion" class="form-control mb-3" placeholder="Ubicación">
    <button class="btn btn-primary w-100">Publicar</button>
  </form>
</div>

<script src="js/app.js"></script>
<script>mostrarUsuario();</script>
</body>
</html>
